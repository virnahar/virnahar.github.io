<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Tax Story">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f11" />
      <stop offset="100%" stop-color="#17171d" />
    </linearGradient>
    <radialGradient id="halo" cx="0.2" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d78c" />
      <stop offset="100%" stop-color="#d4af37" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#halo)" />

  <rect x="70" y="70" width="1060" height="490" rx="28" fill="rgba(255,255,255,0.03)" stroke="rgba(212,175,55,0.25)" />

  <text x="130" y="205" fill="url(#gold)" font-size="86" font-family="Syne, DM Sans, sans-serif" font-weight="700">Tax Story</text>
  <text x="130" y="260" fill="#e8e8eb" font-size="34" font-family="DM Sans, sans-serif">
    India income tax intelligence, private in your browser
  </text>

  <text x="130" y="355" fill="#b8b8bf" font-size="27" font-family="DM Sans, sans-serif">ITR JSON/XML | AIS | TIS</text>
  <text x="130" y="400" fill="#b8b8bf" font-size="27" font-family="DM Sans, sans-serif">Old vs New regime | Risk checks | PDF export</text>

  <circle cx="960" cy="230" r="122" fill="rgba(212,175,55,0.12)" stroke="rgba(212,175,55,0.45)" />
  <text x="960" y="268" text-anchor="middle" fill="url(#gold)" font-size="122" font-family="Noto Sans Devanagari, DM Sans, sans-serif" font-weight="800">Rs</text>

  <text x="130" y="500" fill="#8e8e98" font-size="22" font-family="DM Sans, sans-serif">https://virnahar.github.io/tax-story/</text>
